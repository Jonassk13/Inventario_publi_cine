<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Grupo Publicitario</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #e9ecef; padding: 20px; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 10px; max-width: 800px; margin: 40px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #0056b3; border-bottom: 2px solid #0056b3; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #0056b3; color: white; }
        .badge { background: #f0ad4e; color: white; padding: 3px 8px; border-radius: 3px; font-size: 12px; font-weight: bold;}
    </style>
</head>
<body>

<div class="container">
    <h1 id="tituloGrupo">Cargando Grupo...</h1>
    <h3>Productos del Lote:</h3>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre del Material</th>
                <th>Categoría</th>
                <th>En Bodega</th>
                <th>En Cartelera</th>
            </tr>
        </thead>
        <tbody id="tablaGrupoCuerpo"></tbody>
    </table>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const idGrupo = urlParams.get('id');

    if(idGrupo) {
        fetch(`http://localhost:5000/api/grupos/${idGrupo}`)
        .then(res => {
            if(!res.ok) throw new Error();
            return res.json();
        })
        .then(data => {
            document.getElementById('tituloGrupo').innerText = "Grupo: " + data.nombre_grupo;
            const tbody = document.getElementById('tablaGrupoCuerpo');
            tbody.innerHTML = "";

            data.productos.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.ID_Publicidad}</td>
                    <td><strong>${item.Nombre_Material}</strong></td>
                    <td><span class="badge">${item.Categoria}</span></td>
                    <td style="color:red; font-weight:bold;">${item.Cantidad_Guardados} pzas</td>
                    <td>${item.Cantidad_Cartelera} pzas</td>
                `;
                tbody.appendChild(tr);
            });
        })
        .catch(() => {
            document.getElementById('tituloGrupo').innerText = "Error: El grupo no existe.";
        });
    } else {
        document.getElementById('tituloGrupo').innerText = "Código QR Incorrecto.";
    }
</script>
</body>
</html>
